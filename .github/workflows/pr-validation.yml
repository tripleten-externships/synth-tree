name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.17.1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # Blocks the PR. Only api and admin-dashboard have ESLint configured.
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint admin-dashboard
        run: pnpm --filter admin-dashboard lint

      - name: Lint api
        run: pnpm --filter api lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Type Check
  # Runs per-app in isolation using each app's own tsconfig.
  # Non-blocking (continue-on-error) because 775 pre-existing errors exist
  # across the codebase from before this ticket. Errors are still visible
  # in PR checks. Remove continue-on-error once codebase errors are resolved.
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: "Type Check · ${{ matrix.app }}"
    runs-on: ubuntu-latest
    continue-on-error: true # TODO: remove once pre-existing TS errors are fixed

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: admin-dashboard
            filter: admin-dashboard
          - app: api
            filter: api
          - app: client-frontend
            filter: "@skilltree/client-frontend"
          - app: infra
            filter: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build internal packages
        run: |
          pnpm --filter ./packages/theme build
          pnpm --filter ./packages/ui build

      - name: Type check ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.filter }} type-check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Unit Tests — parallel per app that has a test runner
  # admin-dashboard and client-frontend have no test runner — excluded.
  # infra has Jest but no test/ folder yet — excluded until tests are added.
  # api: has Jest + ts-jest + one real test file.
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests · api"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter api test -- --coverage --ci --passWithNoTests
        env:
          CI: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: apps/api/coverage/
          flags: api-unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Integration Tests
  # Postgres service mirrors docker-compose.yml exactly.
  # Skipped automatically if no integration test files exist (--passWithNoTests).
  # ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests · api"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skilltree
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/skilltree?schema=public"
      FIREBASE_PROJECT_ID: ${{ secrets.CI_FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.CI_FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.CI_FIREBASE_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm --filter api prisma migrate deploy

      - name: Run integration tests
        run: pnpm --filter api test:integration -- --ci --passWithNoTests
        env:
          CI: true

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api-integration
          path: apps/api/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Required gate for branch protection
  # In GitHub: Settings → Branches → Add rule → Required status checks
  # Add the check named exactly: "PR Checks Passed"
  # ─────────────────────────────────────────────────────────────────────────────
  pr-checks-passed:
    name: "PR Checks Passed"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    if: always()

    steps:
      - name: Evaluate results
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "unit-tests=${{ needs.unit-tests.result }}"
          echo "integration-tests=${{ needs.integration-tests.result }}"

          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.unit-tests.result }}" \
            "${{ needs.integration-tests.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ One or more required jobs failed."
              exit 1
            fi
          done

          echo "✅ All required checks passed."
