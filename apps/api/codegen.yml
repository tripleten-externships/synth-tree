overwrite: true
schema: "./src/graphql/schema.graphql"
generates:
  ../../packages/api-types/src/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      skipTypename: false
      withHooks: true
      withHOC: false
      withComponent: false
      # Apollo Client v4 removed these v3-only types from the public surface.
      # Disable them to keep generated code valid against v4.
      withMutationFn: false
      withResultType: false
      withMutationOptionsType: false
      apolloReactHooksImportFrom: "@apollo/client/react"
documents:
  - "./src/**/*.{ts,tsx}"
  - "../admin-dashboard/src/**/*.{ts,tsx}"
  - "../client-frontend/src/**/*.{ts,tsx}"

